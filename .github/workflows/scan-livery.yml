# Scan a candidate livery zip and route it to publish or reject.
#
# Phase 2: triggered manually via workflow_dispatch from the
# GitHub UI -- you paste in a signed URL + sha256 (the cron-side
# dispatcher in Phase 3 will provide both automatically). The
# workflow downloads the zip, verifies its hash, runs the
# scanner, and then either:
#   - calls scripts/scanner/publish.py on pass (currently a stub;
#     real SSH push + repo regen lands in Phase 2c)
#   - calls scripts/scanner/reject.py on fail (also stub today;
#     real Discord staff alert + quarantine webhook in Phase 2c)
#
# Inputs match PLAN.md's spec so we don't have to rev the cron
# dispatcher later.

name: scan-livery

on:
  workflow_dispatch:
    inputs:
      sha256:
        description: 'Expected SHA-256 of the zip at signed_url (lower-case hex).'
        required: true
        type: string
      signed_url:
        description: 'Direct download URL for the candidate livery zip.'
        required: true
        type: string
      uploader_email:
        description: 'ProjectSend uploader email (forensic; identifies the human if rejected).'
        required: true
        type: string
        default: 'manual@victorromeosierra.com'
      uploader_id:
        description: 'ProjectSend user.id of the uploader.'
        required: true
        type: string
        default: '0'
      original_filename:
        description: 'Original filename as uploaded (for the Discord embed).'
        required: true
        type: string
      upload_id:
        description: 'ProjectSend tbl_files.id of this upload.'
        required: true
        type: string
        default: '0'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # publish.py commits the updated pack.json back to main and pushes.
    # Without contents:write the default GITHUB_TOKEN is read-only and
    # the push step fails. fetch-depth: 0 is also needed so git push
    # can build the right ancestry context.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/scanner/requirements.txt

      - name: Install ClamAV
        # apt-get installs clamav (CLI) + clamav-daemon (signatures
        # only -- we don't run clamd; scanner shells out to clamscan).
        # freshclam updates the signature database. May take ~30 s
        # but is required for tier 6 to be meaningful.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clamav
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam --quiet || true
          clamscan --version

      - name: Download candidate
        env:
          SIGNED_URL: ${{ inputs.signed_url }}
        run: |
          curl -fsSL "$SIGNED_URL" -o /tmp/livery.zip
          ls -la /tmp/livery.zip

      - name: Verify sha256
        env:
          EXPECTED: ${{ inputs.sha256 }}
        run: |
          actual=$(sha256sum /tmp/livery.zip | cut -d' ' -f1)
          echo "expected: $EXPECTED"
          echo "actual:   $actual"
          if [ "$actual" != "$EXPECTED" ]; then
            echo "::error::sha256 mismatch -- aborting"
            exit 64
          fi

      - name: Run scanner
        id: scanner
        run: |
          set -o pipefail
          python -m scripts.scanner.scan /tmp/livery.zip --json | tee /tmp/verdict.json
          passed=$(python -c "import json; print(json.load(open('/tmp/verdict.json'))['passed'])")
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
        # Don't fail the workflow on scanner reject -- we want to
        # route to reject.py and complete the staff-alert flow.
        continue-on-error: true

      - name: Publish (on pass)
        if: steps.scanner.outputs.passed == 'True'
        env:
          VRS_SSH_KEY: ${{ secrets.VRS_SSH_KEY }}
          VRS_SSH_HOST: ${{ secrets.VRS_SSH_HOST }}
          DISCORD_LIVERIES_WEBHOOK: ${{ secrets.DISCORD_LIVERIES_WEBHOOK }}
          UPLOADER_EMAIL: ${{ inputs.uploader_email }}
          UPLOADER_ID: ${{ inputs.uploader_id }}
          ORIGINAL_FILENAME: ${{ inputs.original_filename }}
          UPLOAD_ID: ${{ inputs.upload_id }}
          # GITHUB_TOKEN is set automatically; publish.py uses git which
          # reads the auth helper actions/checkout configured for us.
        run: python -m scripts.scanner.publish /tmp/livery.zip /tmp/verdict.json

      - name: Reject (on fail)
        if: steps.scanner.outputs.passed != 'True'
        env:
          DISCORD_STAFF_WEBHOOK: ${{ secrets.DISCORD_STAFF_WEBHOOK }}
          DISCORD_ONCALL_ROLE_ID: ${{ secrets.DISCORD_ONCALL_ROLE_ID }}
          VRS_WEBHOOK_KEY: ${{ secrets.VRS_WEBHOOK_KEY }}
          UPLOADER_EMAIL: ${{ inputs.uploader_email }}
          UPLOADER_ID: ${{ inputs.uploader_id }}
          ORIGINAL_FILENAME: ${{ inputs.original_filename }}
          UPLOAD_ID: ${{ inputs.upload_id }}
        run: python -m scripts.scanner.reject /tmp/verdict.json

      - name: Upload verdict as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verdict
          path: /tmp/verdict.json
          retention-days: 30
